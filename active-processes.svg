<svg xmlns="http://www.w3.org/2000/svg" width="560" height="68" viewBox="0 0 560 68">
  <defs>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="560" height="3">
      <rect width="560" height="1" y="2" fill="#000" opacity="0.12"/>
    </pattern>
    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1s step-end infinite; }
    </style>
  </defs>

  <rect width="560" height="68" fill="#0d1117"/>
  <rect x="1" y="1" width="558" height="66" fill="none" stroke="#00FF41" stroke-width="0.5" opacity="0.25"/>
  <rect width="560" height="68" fill="url(#scanlines)"/>

  <g font-family="'Courier New', Courier, monospace" font-size="13" fill="#00FF41" filter="url(#glow)">
    <text x="20" y="26">  SLOT_01   : &#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;  0% [ INITIALIZING ]</text>
    <text x="20" y="50">  SLOT_02   : &#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;  0% [ INITIALIZING ]<tspan class="cursor">_</tspan></text>
  </g>
</svg>
