<svg xmlns="http://www.w3.org/2000/svg" width="560" height="244" viewBox="0 0 560 244">
  <defs>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="560" height="3">
      <rect width="560" height="1" y="2" fill="#000" opacity="0.12"/>
    </pattern>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.35; }
      }
      .active { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="560" height="244" fill="#0d1117"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="558" height="242" fill="none" stroke="#00FF41" stroke-width="0.5" opacity="0.25"/>
  <!-- Scanlines overlay -->
  <rect width="560" height="244" fill="url(#scanlines)"/>

