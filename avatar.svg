<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#0d1117"/>

  <!-- Subtle border -->
  <rect x="10" y="10" width="480" height="480" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.35"/>

  <!-- Corner ticks -->
  <line x1="10" y1="10" x2="40" y2="10" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
  <line x1="10" y1="10" x2="10" y2="40" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
  <line x1="490" y1="10" x2="460" y2="10" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
  <line x1="490" y1="10" x2="490" y2="40" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
  <line x1="10" y1="490" x2="40" y2="490" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
  <line x1="10" y1="490" x2="10" y2="460" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
  <line x1="490" y1="490" x2="460" y2="490" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
  <line x1="490" y1="490" x2="490" y2="460" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>

  <!-- >_ text with glow -->
  <text
    x="250"
    y="275"
    font-family="'Courier New', Courier, monospace"
    font-size="160"
    font-weight="bold"
    fill="#00FF41"
    text-anchor="middle"
    dominant-baseline="middle"
    filter="url(#glow)"
  >&gt;_</text>
</svg>
